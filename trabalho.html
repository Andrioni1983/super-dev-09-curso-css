<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>Recuperar Senha</title>
</head>
<body>
    <div class="container">
        <h2>Alterar Senha</h2>
        <form action="login.html">
            <label for="email_rec">E-mail:</label>
            <input type="email" id="email_recuupera" name="rec_email" required>
            
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="rec_cpf" placeholder="000.000.000-00" required>
            
            <label for="nova_senha">Nova Senha:</label>
            <input type="password" id="nova_senha" name="new_pass" required>
            
            <label for="conf_senha">Confirmação de Senha:</label>
            <input type="password" id="conf_senha" name="confirm_pass" required>
            
            <button type="submit">Alterar Senha</button>
        </form>
    </div>
</body>
</html>
